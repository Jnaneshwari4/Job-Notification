<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Notification Tracker - Design System</title>
    <!-- Use Inter and Merriweather from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="data.js"></script>
</head>
<body>
    <div class="app-container">
        
        <!-- TOP BAR & NAVIGATION -->
        <header class="header-container">
            <div class="top-bar">
                <div class="top-bar-left">
                    Job Notification Tracker
                </div>
                <div class="top-bar-right">
                    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle Menu">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <nav class="nav-bar" id="navBar">
                <a href="/dashboard" class="nav-link" data-route>Dashboard</a>
                <a href="/saved" class="nav-link" data-route>Saved</a>
                <a href="/digest" class="nav-link" data-route>Digest</a>
                <a href="/settings" class="nav-link" data-route>Settings</a>
                <a href="/proof" class="nav-link" data-route>Proof</a>
            </nav>
        </header>

        <!-- ROUTE OUTLET -->
        <main class="main-content" id="route-outlet">
            <!-- Content will be injected here by the router -->
        </main>

        <!-- PROOF FOOTER -->
        <footer class="proof-footer">
            <ul class="checklist">
                <li class="checked">UI Built</li>
                <li>Logic Working</li>
                <li>Test Passed</li>
                <li>Deployed</li>
            </ul>
        </footer>

    </div>

    <!-- TEMPLATES -->
    <template id="tpl-/">
        <section class="context-header" style="text-align: center; margin: 0 auto 64px auto;">
            <h1 style="font-size: 56px; margin-bottom: 24px;">Stop Missing The Right Jobs.</h1>
            <p class="subtext" style="font-size: 20px; margin-bottom: 40px;">Precision-matched job discovery delivered daily at 9AM.</p>
            <a href="/settings" class="btn btn-primary" data-route style="font-size: 18px; padding: 16px 40px;">Start Tracking</a>
        </section>
    </template>

    <template id="tpl-/dashboard">
        <section class="context-header">
            <h1>Dashboard</h1>
        </section>
        
        <div id="missing-prefs-banner" style="display: none; background: var(--color-bg-hover); border: 1px solid var(--color-border); padding: 16px; margin-bottom: 24px; border-radius: var(--radius);">
            <strong>Set your preferences to activate intelligent matching.</strong> <a href="/settings" data-route style="color: var(--color-accent); font-weight: 500; margin-left: 8px;">Go to Settings →</a>
        </div>

        <div class="filter-bar">
            <div class="form-group">
                <input type="text" id="filter-keyword" class="form-control" placeholder="Search title or company...">
            </div>
            <div class="form-group">
                <select id="filter-location" class="form-control">
                    <option value="">All Locations</option>
                </select>
            </div>
            <div class="form-group">
                <select id="filter-mode" class="form-control">
                    <option value="">All Modes</option>
                    <option value="Remote">Remote</option>
                    <option value="Hybrid">Hybrid</option>
                    <option value="Onsite">Onsite</option>
                </select>
            </div>
            <div class="form-group">
                <select id="filter-experience" class="form-control">
                    <option value="">All Experience</option>
                    <option value="Fresher">Fresher</option>
                    <option value="0-1">0-1 Years</option>
                    <option value="1-3">1-3 Years</option>
                    <option value="3-5">3-5 Years</option>
                </select>
            </div>
            <div class="form-group">
                <select id="filter-source" class="form-control">
                    <option value="">All Sources</option>
                    <option value="LinkedIn">LinkedIn</option>
                    <option value="Naukri">Naukri</option>
                    <option value="Indeed">Indeed</option>
                </select>
            </div>
            <div class="form-group">
                <select id="filter-sort" class="form-control">
                    <option value="latest">Sort: Latest</option>
                    <option value="score">Sort: Match Score</option>
                    <option value="salary">Sort: Salary</option>
                    <option value="oldest">Sort: Oldest</option>
                </select>
            </div>
        </div>

        <div style="margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="toggle-matches-only" style="width: 16px; height: 16px;">
            <label for="toggle-matches-only" style="font-weight: 500; font-size: 14px;">Show only jobs above my threshold</label>
        </div>

        <div id="dashboard-jobs-container" class="jobs-list">
            <!-- Jobs rendered via JS -->
        </div>
        <div id="dashboard-empty-state" class="empty-state" style="display: none;">
            <h3>No roles match your criteria.</h3>
            <p>Adjust filters or lower threshold.</p>
        </div>
    </template>

    <template id="tpl-/saved">
        <section class="context-header">
            <h1>Saved</h1>
        </section>

        <div id="saved-jobs-container" class="jobs-list">
            <!-- Jobs rendered via JS -->
        </div>
        <div id="saved-empty-state" class="empty-state">
            <h3>No saved jobs</h3>
            <p>Saved jobs will appear here later.</p>
        </div>
    </template>

    <template id="tpl-/digest">
        <section class="context-header">
            <h1>Digest</h1>
        </section>
        <div class="empty-state">
            <h3>Daily Digest</h3>
            <p>A daily job digest feature will be added here later.</p>
        </div>
    </template>

    <template id="tpl-/settings">
        <section class="context-header">
            <h1>Settings</h1>
            <p class="subtext">Configure your matching parameters.</p>
        </section>
        <div class="card" style="max-width: 720px;">
            <form id="settings-form">
                <div class="form-group">
                    <label class="form-label">Role keywords (comma-separated)</label>
                    <input type="text" id="pref-roles" class="form-control" placeholder="e.g. Frontend, React, SDE">
                </div>
                <div class="form-group">
                    <label class="form-label">Preferred locations (Ctrl/Cmd+Click to select multiple)</label>
                    <select id="pref-locations" class="form-control" multiple style="height: 120px;">
                        <!-- Injected via JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Mode</label>
                    <div style="display: flex; gap: 16px; margin-top: 8px;">
                        <label><input type="checkbox" name="pref-mode" value="Remote"> Remote</label>
                        <label><input type="checkbox" name="pref-mode" value="Hybrid"> Hybrid</label>
                        <label><input type="checkbox" name="pref-mode" value="Onsite"> Onsite</label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Experience level</label>
                    <select id="pref-experience" class="form-control">
                        <option value="">Any</option>
                        <option value="Fresher">Fresher</option>
                        <option value="0-1">0-1 Years</option>
                        <option value="1-3">1-3 Years</option>
                        <option value="3-5">3-5 Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Your Skills (comma-separated)</label>
                    <input type="text" id="pref-skills" class="form-control" placeholder="e.g. JavaScript, React, SQL">
                </div>
                <div class="form-group">
                    <label class="form-label">Minimum Match Score Threshold (<span id="threshold-val">40</span>)</label>
                    <input type="range" id="pref-threshold" min="0" max="100" value="40" style="width: 100%;">
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Save Preferences</button>
                    <span id="save-msg" style="color: var(--color-success); font-weight: 500; font-size: 14px; display: none; margin-left: 16px;">Saved successfully!</span>
                </div>
            </form>
        </div>
    </template>

    <template id="tpl-/proof">
        <section class="context-header">
            <h1>Proof</h1>
            <p class="subtext">Artifacts and verification will appear here later.</p>
        </section>
    </template>

    <template id="tpl-404">
        <section class="context-header">
            <h1>Page Not Found</h1>
            <p class="subtext">The page you are looking for does not exist.</p>
        </section>
    </template>

    <!-- JOB MODAL -->
    <div id="job-modal" class="modal-backdrop">
        <div class="modal-content">
            <button class="modal-close" id="modal-close-btn">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const outlet = document.getElementById('route-outlet');
            const navLinks = document.querySelectorAll('.nav-link');
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const navBar = document.getElementById('navBar');
            const modal = document.getElementById('job-modal');
            const modalBody = document.getElementById('modal-body');
            const modalCloseBtn = document.getElementById('modal-close-btn');

            let savedJobIds = JSON.parse(localStorage.getItem('savedJobs')) || [];
            let userPreferences = JSON.parse(localStorage.getItem('jobTrackerPreferences')) || null;

            // Filters state
            let currentFilters = {
                keyword: '',
                location: '',
                mode: '',
                experience: '',
                source: '',
                sort: 'latest',
                matchesOnly: false
            };

            const toggleSaveJob = (id, buttonEl, route) => {
                if (savedJobIds.includes(id)) {
                    savedJobIds = savedJobIds.filter(jId => jId !== id);
                } else {
                    savedJobIds.push(id);
                }
                localStorage.setItem('savedJobs', JSON.stringify(savedJobIds));
                
                if (route === '/saved') {
                    renderSavedView();
                } else if (buttonEl) {
                    buttonEl.textContent = savedJobIds.includes(id) ? 'Unsave' : 'Save';
                    buttonEl.classList.toggle('btn-primary', savedJobIds.includes(id));
                    buttonEl.classList.toggle('btn-secondary', !savedJobIds.includes(id));
                }
            };

            const openModal = (jobId) => {
                if (typeof jobsData === 'undefined') return;
                const job = jobsData.find(j => j.id === jobId);
                if (!job) return;

                const isSaved = savedJobIds.includes(job.id);
                modalBody.innerHTML = `
                    <h2 style="font-size: 32px; font-family: var(--font-serif); margin-bottom: 8px;">${job.title}</h2>
                    <p style="font-weight: 600; font-size: 18px; margin-bottom: 24px;">${job.company}</p>
                    
                    <div style="display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 32px;">
                        <div><strong>Location:</strong> ${job.location}</div>
                        <div><strong>Mode:</strong> ${job.mode}</div>
                        <div><strong>Experience:</strong> ${job.experience}</div>
                        <div><strong>Salary:</strong> ${job.salaryRange}</div>
                    </div>
                    
                    <h3 style="margin-bottom: 16px;">Description</h3>
                    <p style="color: var(--color-text-muted); line-height: 1.8; margin-bottom: 32px;">${job.description}</p>
                    
                    <h3 style="margin-bottom: 16px;">Skills</h3>
                    <div class="skills-list" style="margin-bottom: 40px;">
                        ${job.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                    </div>
                    
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="window.open('${job.applyUrl}', '_blank')">Apply Now</button>
                        <button class="btn ${isSaved ? 'btn-primary' : 'btn-secondary'}" onclick="window.toggleSaveJobGlobal('${job.id}', this, 'modal')">${isSaved ? 'Unsave' : 'Save'}</button>
                    </div>
                `;
                modal.classList.add('active');
            };

            const closeModal = () => modal.classList.remove('active');
            modalCloseBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

            // Global expose for inline handlers
            window.toggleSaveJobGlobal = (id, btn, route) => toggleSaveJob(id, btn, route);
            window.openModalGlobal = openModal;
            
            // MATCH SCORING ENGINE
            const calculateMatchScore = (job) => {
                if (!userPreferences) return 0;
                let score = 0;
                const { roles, locations, modes, experience, skills } = userPreferences;

                // +25 Role in Title
                const jobTitleLower = job.title.toLowerCase();
                const matchedTitle = roles.some(role => role && jobTitleLower.includes(role.toLowerCase()));
                if (matchedTitle) score += 25;

                // +15 Role in Description
                const jobDescLower = job.description.toLowerCase();
                const matchedDesc = roles.some(role => role && jobDescLower.includes(role.toLowerCase()));
                if (matchedDesc) score += 15;

                // +15 Location match
                if (locations.includes(job.location)) score += 15;

                // +10 Mode match
                if (modes.includes(job.mode)) score += 10;

                // +10 Experience match
                if (experience && experience === job.experience) score += 10;

                // +15 Skills overlap
                const jobSkillsLower = job.skills.map(s => s.toLowerCase());
                const overlap = skills.some(skill => skill && jobSkillsLower.includes(skill.toLowerCase()));
                if (overlap) score += 15;

                // +5 Recently posted
                if (job.postedDaysAgo <= 2) score += 5;

                // +5 LinkedIn Source
                if (job.source.toLowerCase() === 'linkedin') score += 5;

                return Math.min(score, 100);
            };

            const getScoreBadgeHTML = (score) => {
                if (!userPreferences) return '';
                let colorClass = 'score-grey';
                if (score >= 80) colorClass = 'score-green';
                else if (score >= 60) colorClass = 'score-amber';
                else if (score >= 40) colorClass = 'score-neutral';
                return `<div class="badge-score ${colorClass}">Match: ${score}</div>`;
            };

            const createJobCardHTML = (job, currentPath) => {
                const isSaved = savedJobIds.includes(job.id);
                const score = calculateMatchScore(job);
                const scoreBadge = getScoreBadgeHTML(score);
                
                return `
                    <div class="job-card">
                        <div class="job-header">
                            <div>
                                <div class="job-title">${job.title} ${scoreBadge}</div>
                                <div class="job-company">${job.company}</div>
                            </div>
                            <div class="badge-source">${job.source}</div>
                        </div>
                        <div class="job-meta-row">
                            <div class="job-meta-item">${job.location}</div>
                            <div class="job-meta-item">${job.mode}</div>
                            <div class="job-meta-item">${job.experience}</div>
                            <div class="job-meta-item">${job.salaryRange}</div>
                        </div>
                        <div class="job-meta-row" style="margin-top: 8px; font-size: 12px;">
                            ${job.postedDaysAgo === 0 ? 'Today' : job.postedDaysAgo + ' days ago'}
                        </div>
                        <div class="job-actions">
                            <button class="btn btn-secondary" onclick="window.openModalGlobal('${job.id}')">View</button>
                            <button class="btn ${isSaved ? 'btn-primary' : 'btn-secondary'}" onclick="window.toggleSaveJobGlobal('${job.id}', this, '${currentPath}')">${isSaved ? 'Unsave' : 'Save'}</button>
                            <button class="btn btn-primary" onclick="window.open('${job.applyUrl}', '_blank')">Apply</button>
                        </div>
                    </div>
                `;
            };

            const applyFiltersAndSort = () => {
                if (typeof jobsData === 'undefined') return [];
                const keywordText = currentFilters.keyword.toLowerCase();
                
                let filtered = jobsData.filter(job => {
                    if (keywordText && !job.title.toLowerCase().includes(keywordText) && !job.company.toLowerCase().includes(keywordText)) return false;
                    if (currentFilters.location && job.location !== currentFilters.location) return false;
                    if (currentFilters.mode && job.mode !== currentFilters.mode) return false;
                    if (currentFilters.experience && job.experience !== currentFilters.experience) return false;
                    if (currentFilters.source && job.source !== currentFilters.source) return false;
                    
                    if (currentFilters.matchesOnly && userPreferences) {
                       const score = calculateMatchScore(job);
                       if (score < userPreferences.threshold) return false;
                    }
                    
                    return true;
                });

                if (currentFilters.sort === 'oldest') {
                    filtered.sort((a, b) => b.postedDaysAgo - a.postedDaysAgo);
                } else if (currentFilters.sort === 'score' && userPreferences) {
                    filtered.sort((a, b) => calculateMatchScore(b) - calculateMatchScore(a));
                } else if (currentFilters.sort === 'salary') {
                    // Extract basic numeric salary
                    const getNum = str => {
                        const m = str.match(/\d+(\.\d+)?/);
                        return m ? parseFloat(m[0]) : 0;
                    };
                    filtered.sort((a, b) => getNum(b.salaryRange) - getNum(a.salaryRange));
                } else {
                    filtered.sort((a, b) => a.postedDaysAgo - b.postedDaysAgo);
                }
                return filtered;
            };

            const renderDashboardView = () => {
                if (typeof jobsData === 'undefined') return;
                const container = document.getElementById('dashboard-jobs-container');
                const emptyState = document.getElementById('dashboard-empty-state');
                const locSelect = document.getElementById('filter-location');
                
                if (!container || !emptyState || !locSelect) return;

                // Missing preferences banner
                const banner = document.getElementById('missing-prefs-banner');
                if (banner) {
                   banner.style.display = userPreferences ? 'none' : 'block';
                }

                // Populate dynamic location dropdown if not done
                if (locSelect.options.length === 1) {
                    const locations = [...new Set(jobsData.map(j => j.location))].sort();
                    locations.forEach(loc => {
                        const opt = document.createElement('option');
                        opt.value = loc;
                        opt.textContent = loc;
                        locSelect.appendChild(opt);
                    });
                }

                // Bind listener for text/selects
                ['keyword', 'location', 'mode', 'experience', 'source', 'sort'].forEach(key => {
                    const el = document.getElementById(`filter-${key}`);
                    if(el && !el.dataset.bound) {
                        el.dataset.bound = 'true';
                        el.addEventListener('input', e => {
                            currentFilters[key] = e.target.value;
                            renderDashboardView();
                        });
                    }
                });
                
                // Bind listener for matches only toggle
                const toggle = document.getElementById('toggle-matches-only');
                if(toggle && !toggle.dataset.bound) {
                    toggle.dataset.bound = 'true';
                    toggle.addEventListener('change', e => {
                        currentFilters.matchesOnly = e.target.checked;
                        renderDashboardView();
                    });
                }
                if (toggle) toggle.checked = currentFilters.matchesOnly;

                const filteredJobs = applyFiltersAndSort();
                
                if (filteredJobs.length === 0) {
                    container.style.display = 'none';
                    emptyState.style.display = 'flex';
                } else {
                    container.style.display = 'flex';
                    emptyState.style.display = 'none';
                    container.innerHTML = filteredJobs.map(job => createJobCardHTML(job, '/dashboard')).join('');
                }
            };

            const renderSettingsView = () => {
                const sForm = document.getElementById('settings-form');
                if (!sForm) return;

                const locSelect = document.getElementById('pref-locations');
                if (locSelect && locSelect.options.length === 0 && typeof jobsData !== 'undefined') {
                    const locations = [...new Set(jobsData.map(j => j.location))].sort();
                    locations.forEach(loc => {
                        const opt = document.createElement('option');
                        opt.value = loc;
                        opt.textContent = loc;
                        locSelect.appendChild(opt);
                    });
                }

                // Pre-fill form
                if (userPreferences) {
                    document.getElementById('pref-roles').value = userPreferences.roles.join(', ');
                    
                    const locOptions = locSelect.options;
                    for(let i=0; i<locOptions.length; i++) {
                        locOptions[i].selected = userPreferences.locations.includes(locOptions[i].value);
                    }

                    const modeCheckboxes = document.getElementsByName('pref-mode');
                    modeCheckboxes.forEach(cb => {
                        cb.checked = userPreferences.modes.includes(cb.value);
                    });

                    document.getElementById('pref-experience').value = userPreferences.experience;
                    document.getElementById('pref-skills').value = userPreferences.skills.join(', ');
                    
                    const tSlider = document.getElementById('pref-threshold');
                    tSlider.value = userPreferences.threshold;
                    document.getElementById('threshold-val').textContent = userPreferences.threshold;
                }

                const slider = document.getElementById('pref-threshold');
                slider.addEventListener('input', e => { document.getElementById('threshold-val').textContent = e.target.value; });

                sForm.onsubmit = (e) => {
                    e.preventDefault();
                    
                    const rolesStr = document.getElementById('pref-roles').value;
                    const roles = rolesStr.split(',').map(s=>s.trim()).filter(s=>s);
                    
                    const activeLocs = Array.from(locSelect.selectedOptions).map(opt => opt.value);
                    
                    const activeModes = Array.from(document.getElementsByName('pref-mode')).filter(cb => cb.checked).map(cb => cb.value);
                    
                    const exp = document.getElementById('pref-experience').value;
                    
                    const skillsStr = document.getElementById('pref-skills').value;
                    const skills = skillsStr.split(',').map(s=>s.trim()).filter(s=>s);
                    
                    const threshold = parseInt(document.getElementById('pref-threshold').value, 10);

                    userPreferences = {
                        roles,
                        locations: activeLocs,
                        modes: activeModes,
                        experience: exp,
                        skills,
                        threshold
                    };

                    localStorage.setItem('jobTrackerPreferences', JSON.stringify(userPreferences));
                    
                    const msg = document.getElementById('save-msg');
                    msg.style.display = 'inline';
                    setTimeout(() => msg.style.display = 'none', 3000);
                };
            };

            const renderSavedView = () => {
                if (typeof jobsData === 'undefined') return;
                const container = document.getElementById('saved-jobs-container');
                const emptyState = document.getElementById('saved-empty-state');
                if (!container || !emptyState) return;

                const savedJobs = jobsData.filter(j => savedJobIds.includes(j.id));
                
                if (savedJobs.length === 0) {
                    container.style.display = 'none';
                    emptyState.style.display = 'flex';
                } else {
                    container.style.display = 'flex';
                    emptyState.style.display = 'none';
                    container.innerHTML = savedJobs.map(job => createJobCardHTML(job, '/saved')).join('');
                }
            };

            const renderRoute = (path) => {
                let currentPath = path || '/';
                if (currentPath.startsWith('#')) currentPath = currentPath.substring(1);
                if (currentPath === '' || currentPath.endsWith('index.html')) currentPath = '/';

                let templateId = `tpl-${currentPath}`;
                let template = document.getElementById(templateId);
                if (!template) template = document.getElementById('tpl-404');

                outlet.innerHTML = '';
                outlet.appendChild(template.content.cloneNode(true));

                navLinks.forEach(link => {
                    link.classList.remove('active');
                    const linkPath = link.getAttribute('href');
                    if (linkPath === currentPath || linkPath === "/" + currentPath || currentPath === linkPath.substring(1)) {
                        link.classList.add('active');
                    }
                });

                navBar.classList.remove('open');

                // Trigger specific route renders
                if (currentPath === '/dashboard' || currentPath === 'dashboard') renderDashboardView();
                if (currentPath === '/saved' || currentPath === 'saved') renderSavedView();
                if (currentPath === '/settings' || currentPath === 'settings') renderSettingsView();
            };

            // Routing logic
            const navigateTo = (path) => {
                const isLocalFile = window.location.protocol === 'file:';
                if (isLocalFile) {
                    window.location.hash = path;
                } else {
                    history.pushState(null, '', path);
                    renderRoute(path);
                }
            };

            document.body.addEventListener('click', e => {
                const routeEl = e.target.closest('[data-route]');
                if (routeEl) {
                    e.preventDefault();
                    let path = routeEl.getAttribute('href');
                    if (!path && routeEl.getAttribute('data-route')) path = routeEl.getAttribute('data-route');
                    if (path) navigateTo(path);
                }
            });

            window.addEventListener('popstate', () => {
                if (window.location.protocol !== 'file:') {
                    let path = window.location.pathname;
                    if (path.endsWith('index.html')) path = '/';
                    renderRoute(path);
                }
            });
            
            window.addEventListener('hashchange', () => {
                if (window.location.protocol === 'file:') {
                    renderRoute(window.location.hash || '/');
                }
            });

            mobileMenuBtn.addEventListener('click', () => {
                navBar.classList.toggle('open');
            });

            let initialPath = window.location.pathname;
            if (window.location.protocol === 'file:') {
                initialPath = window.location.hash || '/';
            } else if (initialPath === '/' || initialPath.endsWith('index.html')) {
                initialPath = '/';
            }
            renderRoute(initialPath);
        });
    </script>
</body>
</html>
