<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Notification App - Design System</title>
    <!-- Use Inter and Merriweather from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        
        <!-- TOP BAR & NAVIGATION -->
        <header class="header-container">
            <div class="top-bar">
                <div class="top-bar-left">
                    Job Notification App
                </div>
                <div class="top-bar-center hide-mobile">
                    Step 2 / 5
                </div>
                <div class="top-bar-right">
                    <span class="badge status-shipped hide-mobile">In Progress</span>
                    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle Menu">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <nav class="nav-bar" id="navBar">
                <a href="/dashboard" class="nav-link" data-route>Dashboard</a>
                <a href="/saved" class="nav-link" data-route>Saved</a>
                <a href="/digest" class="nav-link" data-route>Digest</a>
                <a href="/settings" class="nav-link" data-route>Settings</a>
                <a href="/proof" class="nav-link" data-route>Proof</a>
            </nav>
        </header>

        <!-- ROUTE OUTLET -->
        <main class="main-content" id="route-outlet">
            <!-- Content will be injected here by the router -->
        </main>

        <!-- PROOF FOOTER -->
        <footer class="proof-footer">
            <ul class="checklist">
                <li class="checked">UI Built</li>
                <li>Logic Working</li>
                <li>Test Passed</li>
                <li>Deployed</li>
            </ul>
        </footer>

    </div>

    <!-- TEMPLATES -->
    <template id="tpl-/">
        <section class="context-header">
            <h1>Overview</h1>
            <p class="subtext">This section will be built in the next step.</p>
        </section>
    </template>

    <template id="tpl-/dashboard">
        <section class="context-header">
            <h1>Dashboard</h1>
            <p class="subtext">This section will be built in the next step.</p>
        </section>
    </template>

    <template id="tpl-/saved">
        <section class="context-header">
            <h1>Saved</h1>
            <p class="subtext">This section will be built in the next step.</p>
        </section>
    </template>

    <template id="tpl-/digest">
        <section class="context-header">
            <h1>Digest</h1>
            <p class="subtext">This section will be built in the next step.</p>
        </section>
    </template>

    <template id="tpl-/settings">
        <section class="context-header">
            <h1>Settings</h1>
            <p class="subtext">This section will be built in the next step.</p>
        </section>
    </template>

    <template id="tpl-/proof">
        <section class="context-header">
            <h1>Proof</h1>
            <p class="subtext">This section will be built in the next step.</p>
        </section>
    </template>

    <template id="tpl-404">
        <section class="context-header">
            <h1>Page Not Found</h1>
            <p class="subtext">The page you are looking for does not exist.</p>
        </section>
    </template>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const outlet = document.getElementById('route-outlet');
            const navLinks = document.querySelectorAll('.nav-link');
            const mobileMenuBtn = document.getElementById('mobileMenuBtn');
            const navBar = document.getElementById('navBar');

            // Routing logic
            const navigateTo = (path) => {
                history.pushState(null, '', path);
                renderRoute(path);
            };

            const renderRoute = (path) => {
                // Determine template ID
                let templateId = `tpl-${path}`;
                let template = document.getElementById(templateId);

                if (!template) {
                    template = document.getElementById('tpl-404');
                }

                // Clear outlet and inject new template content
                outlet.innerHTML = '';
                outlet.appendChild(template.content.cloneNode(true));

                // Update active link
                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === path) {
                        link.classList.add('active');
                    }
                });

                // Close mobile menu on navigation
                navBar.classList.remove('open');
            };

            // Click interceptor for data-route links
            document.body.addEventListener('click', e => {
                if (e.target.matches('[data-route]')) {
                    e.preventDefault();
                    navigateTo(e.target.getAttribute('href'));
                }
            });

            // Handle browser back/forward buttons
            window.addEventListener('popstate', () => {
                renderRoute(window.location.pathname);
            });

            // Mobile menu toggle
            mobileMenuBtn.addEventListener('click', () => {
                navBar.classList.toggle('open');
            });

            // Handle the initial load (default to index template if route is generic /)
            const initialPath = window.location.pathname === '/' || window.location.pathname.endsWith('index.html') ? '/' : window.location.pathname;
            
            // Note: Since this is a static file server context for the subagent/design system,
            // we will default to '/' if they loaded the file directly so the UI doesn't look blank.
            const p = initialPath.includes('.html') ? '/' : initialPath;
            renderRoute(p);
            
            // To provide a smooth visual start if testing as file:///
            if (window.location.protocol === 'file:') {
                renderRoute('/dashboard'); // Pre-select a route for file browsing visually.
            }
        });
    </script>
</body>
</html>
